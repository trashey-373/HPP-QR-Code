<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth;overflow-x:hidden}
  body{background:#0c0a08;color:#f0ead8;font-family:'Jost',sans-serif;font-weight:300;min-height:100vh;overflow-x:hidden;padding-top:170px}

  /* ── SCROLLBAR ── */
  ::-webkit-scrollbar{width:3px}
  ::-webkit-scrollbar-track{background:#141210}
  ::-webkit-scrollbar-thumb{background:#a07830;border-radius:3px}

  /* ── NOISE OVERLAY ── */
  body::before{
    content:'';position:fixed;inset:0;
    background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
    pointer-events:none;z-index:0;opacity:.4;
  }

  /* ── HEADER ── */
  .header{
    position:fixed;top:0;left:0;right:0;z-index:101;
    background:rgba(12,10,8,.96);
    backdrop-filter:blur(20px) saturate(160%);
    border-bottom:1px solid #2e2a24;
    padding:14px 20px 12px;
    overflow:hidden;
    text-align: center;
  }
  .header::after{
    content:'';position:absolute;bottom:0;left:50%;transform:translateX(-50%);
    width:60%;height:1px;
    background:linear-gradient(90deg,transparent,#c9a84c,transparent);
  }
  /* flex row: logo + text block side by side */
  .header-inner{
    display:flex;align-items:center;gap:14px;
    max-width:680px;margin:0 auto;
  }
  .header-logo{
    width:52px;height:52px;
    object-fit:cover;
    flex-shrink:0;
    animation:logoFadeIn .8s ease forwards;
    opacity:0;transform:scale(.9);
  }
  @keyframes logoFadeIn{to{opacity:1;transform:scale(1)}}
  .header-text{flex:1;min-width:0}
  .header-name{
    font-family:'Cormorant Garamond',serif;font-size:clamp(0.7rem,4.5vw,0.8rem);
    font-weight:900;letter-spacing:.04em;color:#e8c97e;
    animation:fadeUp .7s .2s ease both;
    text-shadow:0 0 40px rgba(221, 216, 204, 0.3);
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  }
  .header-tagline{
    font-size:.5rem;letter-spacing:.2em;text-transform:uppercase;
    color:#9e9080;margin-top:3px;
    animation:fadeUp .7s .4s ease both;
  }
  
  @keyframes expandW{to{transform:scaleX(1)}}
  @keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}

  /* ── STICKY NAV ── */
  .nav-wrap{
    position:fixed;top:80px;left:0;right:0;z-index:99;
    background:rgba(12,10,8,.94);
    backdrop-filter:blur(16px) saturate(150%);
    border-bottom:1px solid #2e2a24;
  }
  .nav-tabs{
    display:flex;overflow-x:auto;gap:0;
    scrollbar-width:none;-ms-overflow-style:none;
    padding:0 1px;
  }
  .nav-tabs::-webkit-scrollbar{display:none}
  .nav-tab{
    position:relative;padding:9px 7px;
    font-family:'Jost',sans-serif;font-size:.72rem;font-weight:500;
    letter-spacing:.14em;text-transform:uppercase;
    color:#9e9080;white-space:nowrap;cursor:pointer;
    border:none;background:none;transition:color .3s;
    flex-shrink:0;
  }
  .nav-tab::after{
    content:'';position:absolute;bottom:0;left:50%;transform:translateX(-50%) scaleX(0);
    width:70%;height:2px;background:#c9a84c;
    transition:transform .3s cubic-bezier(.34,1.56,.64,1);
    border-radius:2px;
  }
  .nav-tab.active{color:#e8c97e}
  .nav-tab.active::after,.nav-tab:hover::after{transform:translateX(-50%) scaleX(1)}
  .nav-tab:hover{color:#e8e0d0}

  /* dropdown arrow for sub-cats */
  .nav-tab[data-has-sub]::before{
    content:'▾';font-size:.6rem;margin-left:4px;vertical-align:1px;
  }

  /* ── DROPDOWN SUB-CATEGORY ── */
  .sub-nav{
    overflow:hidden;max-height:0;transition:max-height .4s cubic-bezier(.4,0,.2,1);
    background:#1e1b17;border-top:1px solid #2e2a24;
  }
  .sub-nav.open{max-height:120px}
  .sub-nav-inner{
    display:flex;gap:0;overflow-x:auto;padding:8px 5px;
    scrollbar-width:none;
  }
  .sub-nav-inner::-webkit-scrollbar{display:none}
  .sub-chip{
    padding:7px 14px;font-size:.68rem;letter-spacing:.1em;text-transform:uppercase;
    background:#2a2620;color:#9e9080;border-radius:100px;
    border:1px solid #2e2a24;cursor:pointer;white-space:nowrap;
    transition:all .25s;flex-shrink:0;
  }
  .sub-chip.active,.sub-chip:hover{
    background:#c9a84c;color:#0c0a08;border-color:#c9a84c;
    font-weight:500;
  }

  /* ── MAIN CONTENT ── */
  .content{padding:20px 16px 100px;position:relative;z-index:1}

  /* ── SECTION HEADER ── */
  .section-label{
    display:flex;align-items:center;gap:12px;
    margin:32px 0 18px;
  }
  .section-label:first-child{margin-top:0}
  .section-title{
    font-family:'Cormorant Garamond',serif;font-size:1.3rem;font-weight:500;
    color:#e8c97e;letter-spacing:.04em;white-space:nowrap;
  }
  .section-line{
    flex:1;height:1px;
    background:linear-gradient(90deg,#a07830,transparent);
  }
  .section-badge{
    font-size:.6rem;letter-spacing:.15em;text-transform:uppercase;
    color:#0c0a08;background:#c9a84c;padding:3px 9px;border-radius:100px;
    font-weight:500;
  }

  /* ── ITEM CARDS ── */
  .item-grid{display:flex;flex-direction:column;gap:2px}
  .item-card{
    display:flex;align-items:center;justify-content:space-between;
    padding:14px 16px;
    background:#141210;
    border:1px solid #2e2a24;border-radius:14px;
    cursor:default;
    transition:all .25s cubic-bezier(.4,0,.2,1);
    opacity:0;transform:translateY(10px);
    animation:cardIn .4s ease forwards;
    margin-bottom:2px;
  }
  @keyframes cardIn{to{opacity:1;transform:translateY(0)}}
  .item-card:hover{
    background:#1e1b17;border-color:#a07830;
    transform:translateX(3px);
    box-shadow:-3px 0 0 #c9a84c;
  }
  .item-info{flex:1;min-width:0}
  .item-name{
    font-size:.88rem;font-weight:400;color:#f5f0e8;
    letter-spacing:.02em;line-height:1.3;
  }
  .item-desc{
    font-size:.73rem;color:#9e9080;margin-top:3px;
    line-height:1.4;
  }
  .item-tags{display:flex;gap:5px;margin-top:5px;flex-wrap:wrap}
  .tag{
    font-size:.58rem;letter-spacing:.08em;text-transform:uppercase;
    padding:2px 7px;border-radius:100px;border:1px solid;font-weight:500;
  }
  .tag-veg{color:#7bc67e;border-color:rgba(123,198,126,.3);background:rgba(123,198,126,.08)}
  .tag-gf{color:#c9a84c;border-color:rgba(201,168,76,.3);background:rgba(201,168,76,.08)}
  .tag-spicy{color:#e8805a;border-color:rgba(232,128,90,.3);background:rgba(232,128,90,.08)}
  .tag-popular{color:#c09ed8;border-color:rgba(192,158,216,.3);background:rgba(192,158,216,.08)}
  .item-price{
    font-family:'Cormorant Garamond',serif;font-size:1.05rem;font-weight:600;
    color:#c9a84c;margin-left:14px;white-space:nowrap;
  }
  .item-price span{font-size:.65rem;font-weight:300;color:#9e9080}

  /* ── FEATURED / LARGE CARD ── */
  .item-card.featured{
    flex-direction:column;align-items:flex-start;
    padding:16px 16px 14px;
    background:linear-gradient(135deg,#1e1b17,#141210);
    border-color:#a07830;
  }
  .item-card.featured .item-price{margin-left:0;margin-top:10px;font-size:1.15rem}
  .featured-top{display:flex;justify-content:space-between;width:100%;align-items:flex-start}

  /* ── GLUTEN FREE HIGHLIGHT ── */
  .gf-banner{
    background:linear-gradient(135deg,rgba(201,168,76,.12),rgba(201,168,76,.04));
    border:1px solid rgba(201,168,76,.25);border-radius:14px;
    padding:14px 16px;margin-bottom:20px;
    display:flex;align-items:center;gap:12px;
  }
  .gf-icon{font-size:1.6rem}
  .gf-text h3{font-family:'Cormorant Garamond',serif;font-size:1rem;color:#e8c97e;font-weight:500}
  .gf-text p{font-size:.72rem;color:#9e9080;margin-top:2px;line-height:1.4}

  /* ── PRICE NOTE ── */
  .price-note{
    font-size:.68rem;
    letter-spacing:.05em;text-align:center;
    margin:16px 0 28px;padding:11px 16px;
    border-radius:8px;line-height:1.7;
    display:flex;align-items:center;justify-content:center;gap:8px;
  }
  .price-note-incl{
    border:1px solid rgba(201,168,76,.22);
    background:rgba(201,168,76,.05);
    color:#b89a54;
  }
  .price-note-incl::before{content:'✓';font-size:.78rem;color:#c9a84c;flex-shrink:0;}
  .price-note-excl{
    border:1px solid rgba(232,128,90,.2);
    background:rgba(232,128,90,.04);
    color:#9e9080;
  }
  .price-note-excl::before{content:'ⓘ';font-size:.78rem;color:#e8805a;flex-shrink:0;}
  .category-note{margin-bottom:40px;}

  /* ── EMPTY STATE ── */
  .empty{text-align:center;padding:60px 20px;color:#9e9080}
  .empty-icon{font-size:2.5rem;margin-bottom:12px;opacity:.4}
  .empty p{font-size:.82rem;letter-spacing:.08em;text-transform:uppercase}

  /* ── FOOTER ── */
  .footer{
    background:#141210;border-top:1px solid #2e2a24;
    padding:32px 20px 40px;text-align:center;
    position:relative;overflow:hidden;
  }
  .footer::before{
    content:'';position:absolute;top:0;left:50%;transform:translateX(-50%);
    width:40%;height:1px;background:linear-gradient(90deg,transparent,#c9a84c,transparent);
  }
  .footer-logo{
    width:48px;height:48px;border-radius:50%;object-fit:cover;
    border:1px solid #a07830;margin-bottom:10px;opacity:.7;
  }
  .footer-sections{display:flex;justify-content:center;gap:24px;margin-bottom:20px;flex-wrap:wrap}
  .footer-section h4{
    font-size:.65rem;letter-spacing:.2em;text-transform:uppercase;
    color:#c9a84c;margin-bottom:8px;font-weight:500;
  }
  .footer-section ul{list-style:none}
  .footer-section li{
    font-size:.72rem;color:#9e9080;margin-bottom:4px;
    letter-spacing:.04em;
  }
  .footer-bottom{font-size:.65rem;color:#9e9080;letter-spacing:.1em;text-transform:uppercase;line-height:1.8}
  .footer-bottom a{color:#a07830;text-decoration:none}

  /* ── HIDDEN ── */
  .section-group{transition:opacity .3s,transform .3s}
  .section-group.hidden{display:none}
  .category-group.hidden{display:none}

  /* ── SCROLL TO TOP ── */
  .scroll-top{
    position:fixed;bottom:24px;right:20px;
    width:42px;height:42px;border-radius:50%;
    background:#c9a84c;border:none;cursor:pointer;
    color:#0c0a08;font-size:1rem;
    display:flex;align-items:center;justify-content:center;
    box-shadow:0 4px 20px rgba(201,168,76,.4);
    opacity:0;transform:translateY(20px);pointer-events:none;
    transition:all .3s cubic-bezier(.34,1.56,.64,1);z-index:200;
  }
  .scroll-top.visible{opacity:1;transform:translateY(0);pointer-events:all}
  .scroll-top:hover{background:#e8c97e;transform:translateY(-2px)}

  /* ── STAGGER DELAYS ── */
  .item-card:nth-child(1){animation-delay:.05s}
  .item-card:nth-child(2){animation-delay:.09s}
  .item-card:nth-child(3){animation-delay:.13s}
  .item-card:nth-child(4){animation-delay:.17s}
  .item-card:nth-child(5){animation-delay:.21s}
  .item-card:nth-child(6){animation-delay:.25s}
  .item-card:nth-child(7){animation-delay:.29s}
  .item-card:nth-child(8){animation-delay:.33s}
  .item-card:nth-child(9){animation-delay:.37s}
  .item-card:nth-child(10){animation-delay:.41s}

  /* ── RESPONSIVE ── */
  @media(min-width:420px){
    .item-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px}
    .item-card.featured{grid-column:1/-1}
  }
  @media(min-width:768px){
    .item-grid{grid-template-columns:repeat(3,1fr)}
    .content{padding:24px 24px 100px;max-width:680px;margin:0 auto}
    .item-card.featured{grid-column:1/-1}
  }
</style>
</head>

function tagHTML(tags){
  if(!tags||!tags.length) return '';
  const map={veg:'🟢 Veg',gf:'Gluten-Free',spicy:'🌶 Spicy',popular:'⭐ Popular'};
  const cls={veg:'tag-veg',gf:'tag-gf',spicy:'tag-spicy',popular:'tag-popular'};
  return `<div class="item-tags">${tags.map(t=>`<span class="tag ${cls[t]||''}">${map[t]||t}</span>`).join('')}</div>`;
}

function itemCardHTML(item, delay=0){
  const hasTags = item.tags&&item.tags.length;
  return `
  <div class="item-card" style="animation-delay:${delay}s">
    <div class="item-info">
      <div class="item-name">${item.name}</div>
      ${item.desc?`<div class="item-desc">${item.desc}</div>`:''}
      ${hasTags?tagHTML(item.tags):''}
    </div>
    <div class="item-price">Nu.&nbsp;${item.price}<span> /-</span></div>
  </div>`;
}

function sectionHTML(subCat, filterKey, delay=0){
  let html = `<div class="section-group" data-cat="${filterKey}" data-sub="${subCat.id}">
    <div class="section-label">
      <span class="section-title">${subCat.label}</span>
      <span class="section-line"></span>
    </div>
    <div class="item-grid">`;
  subCat.items.forEach((item,i)=>{
    html += itemCardHTML(item, (delay + i*0.03).toFixed(2));
  });
  html += `</div>`;
  html += `</div>`;
  return html;
}

function renderAll(){
  const content = document.getElementById('mainContent');
  let html = '';
  const inclKeys = ['cafe','bar'];
  const order = ['cafe','restaurant','bar','glutenfree'];
  order.forEach(key=>{
    if(menuData[key]){
      const section = menuData[key];
      const isIncl = inclKeys.includes(key);
      const noteClass = isIncl ? 'price-note price-note-incl' : 'price-note price-note-excl';
      const noteText = isIncl
        ? 'All prices in Nu. &amp; inclusive of 5% GST and 10% Service Charge.'
        : 'All prices in Nu. &amp; exclusive of 5% GST and 10% Service Charge.';
      html += `<div class="category-group" data-category="${key}">`;
      let d=0;
      section.subCategories.forEach(sub=>{
        html += sectionHTML(sub, key, d);
        d += 0.1;
      });
      html += `<div class="${noteClass} category-note">${noteText}</div>`;
      html += `</div>`;
    }
  });
  content.innerHTML = html;
}

function applyFilter(){
  // show/hide individual section groups
  const groups = document.querySelectorAll('.section-group');
  groups.forEach(g=>{
    const cat = g.dataset.cat;
    const sub = g.dataset.sub;
    let show = false;
    if(currentFilter==='all') show=true;
    else if(currentFilter===cat){
      show = !currentSub || currentSub===sub;
    }
    g.classList.toggle('hidden', !show);
  });
  // show/hide category-group wrappers (and their note)
  document.querySelectorAll('.category-group').forEach(cg=>{
    const cat = cg.dataset.category;
    const visible = currentFilter==='all' || currentFilter===cat;
    cg.classList.toggle('hidden', !visible);
  });

  // scroll to first visible section
  const first = document.querySelector('.section-group:not(.hidden)');
  if(first){
    const header = document.querySelector('.header');
    const nav = document.getElementById('mainNav');
    const fixedOffset = (header ? header.offsetHeight : 80) + (nav ? nav.offsetHeight : 90) + 20;
    const y = first.getBoundingClientRect().top + window.scrollY - fixedOffset;
    window.scrollTo({top: Math.max(0, y), behavior:'smooth'});
  }
}

function updateSubNav(filter){
  const subNav = document.getElementById('subNav');
  const inner = document.getElementById('subNavInner');
  const subs = subCategories[filter];
  if(subs){
    inner.innerHTML = subs.map(s=>
      `<button class="sub-chip${currentSub===s.id?' active':''}" onclick="setSub('${s.id}',this)">${s.label}</button>`
    ).join('');
    subNav.classList.add('open');
  } else {
    subNav.classList.remove('open');
    inner.innerHTML='';
  }
}

function setFilter(filter, btn){
  currentFilter = filter;
  currentSub = null;
  document.querySelectorAll('.nav-tab').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  updateSubNav(filter);
  applyFilter();
}

function setSub(subId, btn){
  if(currentSub===subId){
    currentSub=null;
    btn.classList.remove('active');
  } else {
    currentSub=subId;
    document.querySelectorAll('.sub-chip').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
  }
  applyFilter();
}

/* ═══════════════════════════════════════════════════
   SCROLL TO TOP
═══════════════════════════════════════════════════ */
window.addEventListener('scroll',()=>{
  const btn=document.getElementById('scrollTop');
  btn.classList.toggle('visible',window.scrollY>300);
});

/* ═══════════════════════════════════════════════════
   INIT
═══════════════════════════════════════════════════ */
renderAll();
</script>
